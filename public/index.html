<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Кабинет преподавателя</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📅</text></svg>">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      margin: 0;
      background: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    
    .header {
      background: #161b22;
      padding: 16px;
      border-bottom: 1px solid #30363d;
    }
    
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    
    .user-info {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    
    .avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 3px solid #58a6ff;
      background: #21262d;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }
    
    .refresh-btn {
      background: #238636;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    
    .refresh-btn:hover {
      background: #2ea043;
    }
    
    .refresh-btn:active {
      transform: scale(0.98);
    }
    
    .tabs {
      display: flex;
      background: #161b22;
      border-bottom: 1px solid #30363d;
    }
    
    .tab {
      flex: 1;
      padding: 16px;
      text-align: center;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      user-select: none;
    }
    
    .tab.active {
      background: #1f6feb;
      color: white;
    }
    
    .legend {
      padding: 14px;
      background: #161b22;
      display: flex;
      justify-content: center;
      gap: 24px;
      font-size: 13px;
      flex-wrap: wrap;
    }
    
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .legend-box {
      width: 16px;
      height: 16px;
      border-radius: 6px;
    }
    
    .content {
      padding: 12px;
      height: calc(100vh - 250px);
      overflow-y: auto;
      position: relative;
    }
    
    .week-header {
      display: flex;
      margin-left: 68px;
      margin-bottom: 8px;
      font-size: 12px;
      color: #8b949e;
    }
    
    .day-name {
      width: 88px;
      text-align: center;
      flex: none;
    }
    
    .time-row {
      display: flex;
      align-items: center;
      margin: 3px 0;
    }
    
    .time-label {
      width: 68px;
      text-align: right;
      font-size: 13px;
      color: #8b949e;
      padding-right: 12px;
      flex: none;
    }
    
    .slots {
      display: flex;
      flex: 1;
    }
    
    .slot {
      width: 80px;
      height: 56px;
      margin: 0 4px;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      overflow: hidden;
      user-select: none;
    }
    
    .slot:hover {
      transform: scale(1.02);
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }
    
    .state-0 { background: #21262d; color: #8b949e; }
    .state-1 { background: #238636; color: white; }
    .state-2 { background: #da3633; color: white; }
    
    .slot-time {
      font-size: 9px;
      opacity: 0.8;
      margin-bottom: 3px;
    }
    
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: #8b949e;
      font-size: 16px;
    }
    
    .error {
      text-align: center;
      padding: 60px 20px;
      color: #da3633;
    }
    
    .sync-notice {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #1f6feb;
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 12px;
      animation: fadeIn 0.3s;
      z-index: 1000;
    }
    
    .cache-notice {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: #ffa500;
      color: #000;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 12px;
      animation: fadeIn 0.3s;
      z-index: 1000;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    button {
      font-family: inherit;
    }
    
    #lastSync {
      font-size: 11px;
      color: #8b949e;
      text-align: center;
      margin-top: 10px;
    }

    .statistics-section {
      background: #161b22;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid #30363d;
    }
    .date-filter {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .date-input {
      flex: 1;
      min-width: 140px;
      padding: 10px;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: white;
      font-size: 14px;
    }
    .stat-summary {
      background: #21262d;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .stat-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .stat-label { color: #8b949e; }
    .stat-value { font-weight: 600; color: white; }
    .student-stat {
      background: #21262d;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
    }
    .student-stat-header { font-weight: 600; margin-bottom: 8px; color: white; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-top">
      <div class="user-info">
        <div class="avatar">👨‍🏫</div>
        <div>
          <h3 id="userName">Загрузка...</h3>
          <p>Кабинет преподавателя</p>
        </div>
      </div>
      <button class="refresh-btn" id="refreshBtn" onclick="forceRefresh()">
        🔄 Обновить
      </button>
    </div>
    <div id="lastSync"></div>
  </div>
  
  <div class="tabs">
    <div class="tab active" onclick="showSchedule()">Расписание</div>
    <div class="tab" onclick="showBookings()">Ученики</div>
    <div class="tab" onclick="showLessons()">Занятия</div>
    <div class="tab" onclick="showStatistics()">Статистика</div>
  </div>
  
  <div style="padding: 8px 16px; background: #161b22; border-bottom: 1px solid #30363d; display: flex; justify-content: flex-start; align-items: center;">
    <button onclick="showCalendarView()" style="
      background: #1f6feb;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    " onmouseover="this.style.background='#1565c0'" onmouseout="this.style.background='#1f6feb'">
      📅 Календарь
    </button>
  </div>
  
  <div class="legend">
    <div class="legend-item"><div class="legend-box" style="background:#21262d"></div>Не работаю</div>
    <div class="legend-item"><div class="legend-box" style="background:#238636"></div>Свободен</div>
    <div class="legend-item"><div class="legend-box" style="background:#da3633"></div>Занят</div>
  </div>
  
  <div id="occupancyStats" style="
    padding: 12px 16px;
    background: #161b22;
    border-bottom: 1px solid #30363d;
    text-align: center;
    font-size: 14px;
    color: #c9d1d9;
    display: none;
  ">
    <div style="display: flex; justify-content: center; align-items: center; gap: 8px;">
      <span style="color: #58a6ff; font-weight: 600;">⏰ Занятость за неделю:</span>
      <span id="weeklyHours" style="color: white; font-weight: 600;">0 ч</span>
    </div>
  </div>
  
  <div class="content" id="content">
    <div class="loading">Загрузка расписания...</div>
  </div>

  <script>
    // Telegram Web App
    if (typeof Telegram !== 'undefined') {
      Telegram.WebApp.ready();
      Telegram.WebApp.expand();
    }
    
    // Проверка роли при загрузке страницы - если менеджер, перенаправляем
    (async function checkRoleOnLoad() {
      try {
        function getTelegramIdFromURL() {
          const params = new URLSearchParams(window.location.search);
          if (params.get('tgId')) return params.get('tgId');
          if (typeof Telegram !== 'undefined' && Telegram.WebApp && Telegram.WebApp.initDataUnsafe && Telegram.WebApp.initDataUnsafe.user) {
            return Telegram.WebApp.initDataUnsafe.user.id.toString();
          }
          return null;
        }
        
        const tgId = getTelegramIdFromURL();
        if (tgId) {
          const response = await fetch(`/api/user?tgId=${tgId}&t=${Date.now()}`);
          const user = await response.json();
          
          // Если менеджер, сразу перенаправляем
          if (user.role === 'manager' || (user.role && user.role.toLowerCase().includes('manager'))) {
            console.log('⚠️ Обнаружен менеджер на странице преподавателя, перенаправляем на manager.html');
            window.location.replace(`/manager.html?tgId=${tgId}`);
            return;
          }
        }
      } catch (error) {
        console.error('Ошибка проверки роли при загрузке:', error);
      }
    })();
    
    // Константы
    const DAYS = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];
    const FULL_DAYS = ['Понедельник', 'Вторник', 'Среда', 'Четверг', 'Пятница', 'Суббота', 'Воскресенье'];
    const TIMES = [];
    for (let h = 8; h <= 22; h++) {
      TIMES.push(`${h.toString().padStart(2, '0')}:00`);
      if (h < 22) TIMES.push(`${h.toString().padStart(2, '0')}:30`);
    }
    const TEXTS = ['Не работаю', 'Свободен', 'Занят'];
    
    // Данные
    let schedule = {};
    let lastScheduleHash = '';
    let isSaving = false;
    let lastUpdateTime = 0;
    
    // Получить telegram_id из Telegram Web App
    function getTelegramId() {
      if (typeof Telegram !== 'undefined' && Telegram.WebApp && Telegram.WebApp.initDataUnsafe) {
        const user = Telegram.WebApp.initDataUnsafe.user;
        if (user && user.id) {
          return user.id.toString();
        }
      }
      // Fallback для разработки
      return '913096324';
    }
    
    const MY_ID = getTelegramId();
    const STORAGE_KEY = 'teacher_schedule_v2';
    const CACHE_TTL = 30000; // 30 секунд
    
    // ===== УТИЛИТЫ =====
    
    // Генерация хэша расписания
    function getScheduleHash(sched) {
      let hash = '';
      FULL_DAYS.forEach(day => {
        TIMES.forEach(time => {
          const slotValue = sched[day]?.[time] || 0;
          const state = typeof slotValue === 'object' ? slotValue.status : slotValue;
          const studentName = typeof slotValue === 'object' && slotValue.student_name ? slotValue.student_name : '';
          hash += `${day}-${time}:${state}:${studentName}|`;
        });
      });
      return hash;
    }
    
    // Сохранение в кеш
    function saveToCache(data) {
      try {
        const cache = {
          data: data,
          timestamp: Date.now(),
          hash: getScheduleHash(data)
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(cache));
      } catch (e) {
        console.warn("Не удалось сохранить в кеш:", e);
      }
    }
    
    // Загрузка из кеша
    function loadFromCache() {
      try {
        const cached = localStorage.getItem(STORAGE_KEY);
        if (!cached) return null;
        
        const cache = JSON.parse(cached);
        const now = Date.now();
        
        if (now - cache.timestamp < CACHE_TTL) {
          return cache.data;
        }
      } catch (e) {
        console.warn("Ошибка загрузки из кеша:", e);
      }
      return null;
    }
    
    // Показать уведомление
    function showNotice(text, color = '#1f6feb', duration = 2000) {
      const notice = document.createElement('div');
      notice.className = 'sync-notice';
      notice.style.background = color;
      notice.textContent = text;
      document.body.appendChild(notice);
      
      setTimeout(() => {
        notice.style.opacity = '0';
        notice.style.transform = 'translateY(10px)';
        setTimeout(() => document.body.removeChild(notice), 300);
      }, duration);
    }
    
    // Обновить время последней синхронизации
    function updateLastSyncTime() {
      const now = new Date();
      const timeStr = now.toLocaleTimeString('ru-RU', { 
        hour: '2-digit', 
        minute: '2-digit',
        second: '2-digit'
      });
      document.getElementById('lastSync').textContent = `Последнее обновление: ${timeStr}`;
    }
    
    // ===== ОСНОВНЫЕ ФУНКЦИИ =====
    
    // Загрузка расписания
    async function loadSchedule(force = false) {
      try {
        const refreshBtn = document.getElementById('refreshBtn');
        refreshBtn.disabled = true;
        refreshBtn.textContent = '⏳ Загрузка...';
        
        // Если не форсируем и есть кеш - показываем его
        if (!force) {
          const cached = loadFromCache();
          if (cached) {
            schedule = cached;
            renderSchedule();
            showNotice("Данные из кеша", "#ffa500", 1500);
          }
        }
        
        // Загружаем с сервера
        const url = `/api/my-schedule?tgId=${MY_ID}&t=${Date.now()}`;
        const response = await fetch(url);
        
        if (!response.ok) {
          throw new Error(`Ошибка ${response.status}`);
        }
        
        const data = await response.json();
        
        // Проверяем изменились ли данные
        const newHash = getScheduleHash(data);
        const shouldUpdate = force || newHash !== lastScheduleHash;
        
        if (shouldUpdate) {
          schedule = data;
          lastScheduleHash = newHash;
          lastUpdateTime = data._timestamp || Date.now();
          
          // Сохраняем в кеш
          saveToCache(data);
          
          // Рендерим
          renderSchedule();
          updateLastSyncTime();
          
          if (!force) {
            showNotice("Расписание обновлено");
          }
          
          console.log("✅ Расписание загружено (сервер)");
        } else {
          console.log("ℹ️ Данные не изменились");
        }
        
      } catch (error) {
        console.error("❌ Ошибка загрузки:", error);
        
        // Пробуем показать кеш при ошибке
        const cached = loadFromCache();
        if (cached && Object.keys(cached).length > 0) {
          schedule = cached;
          renderSchedule();
          showNotice("Оффлайн режим (данные из кеша)", "#ffa500", 3000);
        } else {
          document.getElementById('content').innerHTML = `
            <div class="error">
              Ошибка загрузки расписания
              <br>
              <button onclick="forceRefresh()" style="margin-top: 20px;">Повторить</button>
            </div>
          `;
        }
      } finally {
        const refreshBtn = document.getElementById('refreshBtn');
        refreshBtn.disabled = false;
        refreshBtn.textContent = '🔄 Обновить';
      }
    }
    
    // Принудительное обновление
    async function forceRefresh() {
      showNotice("Принудительное обновление...", "#1f6feb");
      await loadSchedule(true);
    }
    
    // Подсчет занятости (красные квадратики - статус 2)
    function calculateOccupancy() {
      let occupiedSlots = 0;
      
      FULL_DAYS.forEach(day => {
        TIMES.forEach(time => {
          const slotValue = schedule[day]?.[time] || 0;
          const state = typeof slotValue === 'object' ? slotValue.status : slotValue;
          if (state === 2) {
            occupiedSlots++;
          }
        });
      });
      
      // Каждый слот = 30 минут
      const totalMinutes = occupiedSlots * 30;
      const hours = Math.floor(totalMinutes / 60);
      const minutes = totalMinutes % 60;
      
      // Отображаем статистику
      const statsDiv = document.getElementById('occupancyStats');
      const hoursSpan = document.getElementById('weeklyHours');
      
      if (statsDiv && hoursSpan) {
        statsDiv.style.display = 'block';
        
        if (hours > 0 && minutes > 0) {
          hoursSpan.textContent = `${hours} ч ${minutes} м`;
        } else if (hours > 0) {
          hoursSpan.textContent = `${hours} ч`;
        } else if (minutes > 0) {
          hoursSpan.textContent = `${minutes} м`;
        } else {
          hoursSpan.textContent = '0 ч';
        }
      }
      
      return { occupiedSlots, totalMinutes, hours, minutes };
    }
    
    // Рендер расписания
    function renderSchedule() {
      if (Object.keys(schedule).length === 0) {
        document.getElementById('content').innerHTML = `
          <div class="loading">
            Расписание пустое. Нажмите на ячейки, чтобы настроить.
          </div>
        `;
        // Скрываем статистику, если расписание пустое
        const statsDiv = document.getElementById('occupancyStats');
        if (statsDiv) statsDiv.style.display = 'none';
        return;
      }
      
      let html = '<div class="week-header"><div></div>';
      DAYS.forEach(d => html += `<div class="day-name">${d}</div>`);
      html += '</div>';
      
      TIMES.forEach(time => {
        html += `<div class="time-row"><div class="time-label">${time}</div><div class="slots">`;
        DAYS.forEach((_, i) => {
          const day = FULL_DAYS[i];
          const slotValue = schedule[day]?.[time] || 0;
          const state = typeof slotValue === 'object' ? slotValue.status : slotValue;
          const studentName = typeof slotValue === 'object' && slotValue.student_name ? slotValue.student_name : null;
          const slotId = `slot-${day}-${time}`;
          html += `<div class="slot state-${state}" id="${slotId}" 
                   onclick="toggleSlot('${day}', '${time}', this)"
                   oncontextmenu="handleSlotLongPress(event, '${day}', '${time}', ${state}); return false;"
                   ontouchstart="handleSlotTouchStart(event, '${day}', '${time}', ${state})"
                   ontouchend="handleSlotTouchEnd(event)"
                   ontouchmove="handleSlotTouchEnd(event)">
            <div class="slot-time">${time}</div>
            <div>${TEXTS[state]}</div>
            ${studentName ? `<div style="font-size: 9px; margin-top: 4px; opacity: 0.9; line-height: 1.2;">${studentName}</div>` : ''}
          </div>`;
        });
        html += '</div></div>';
      });
      
      document.getElementById('content').innerHTML = html;
      
      // Обновляем статистику занятости после рендера
      calculateOccupancy();
    }
    
    // Переключение ячейки
    async function toggleSlot(day, time, element) {
      if (isSaving) {
        showNotice("Подождите, идет сохранение...", "#ffa500", 1000);
        return;
      }
      
      isSaving = true;
      
      try {
        // Локальное обновление
        if (!schedule[day]) schedule[day] = {};
        const currentValue = schedule[day][time] || 0;
        const current = typeof currentValue === 'object' ? currentValue.status : currentValue;
        const next = (current + 1) % 3;
        
        // Сохраняем имя ученика, если оно было
        const studentName = typeof currentValue === 'object' && currentValue.student_name ? currentValue.student_name : null;
        if (next === 2 && studentName) {
          schedule[day][time] = { status: next, student_name: studentName };
        } else if (next === 2) {
          schedule[day][time] = next;
        } else {
          schedule[day][time] = next;
        }
        
        // Мгновенное обновление UI
        element.className = `slot state-${next}`;
        const textDiv = element.querySelectorAll('div')[1]; // Второй div с текстом
        if (textDiv) {
          textDiv.textContent = TEXTS[next];
        }
        
        // Удаляем имя ученика, если ячейка не занята
        const nameDiv = element.querySelectorAll('div')[2];
        if (nameDiv && next !== 2) {
          nameDiv.remove();
        } else if (next === 2 && studentName && !nameDiv) {
          // Добавляем имя ученика, если ячейка занята и имя есть
          const newNameDiv = document.createElement('div');
          newNameDiv.style.cssText = 'font-size: 9px; margin-top: 4px; opacity: 0.9; line-height: 1.2;';
          newNameDiv.textContent = studentName;
          element.appendChild(newNameDiv);
        }
        
        // Обновляем статистику занятости
        calculateOccupancy();
        
        // Сохраняем в кеш сразу
        saveToCache(schedule);
        lastScheduleHash = getScheduleHash(schedule);
        
        // Отложенное сохранение на сервер
        setTimeout(async () => {
          try {
            const response = await fetch(`/api/schedule/${MY_ID}?tgId=${MY_ID}&t=${Date.now()}`, {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify(schedule)
            });
            
            const result = await response.json();
            if (result.ok) {
              showNotice("Сохранено", "#238636", 1000);
              lastUpdateTime = result._timestamp || Date.now();
              updateLastSyncTime();
            }
          } catch (saveError) {
            console.error("Ошибка сохранения на сервер:", saveError);
            showNotice("Ошибка сети", "#da3633", 2000);
          }
        }, 500); // Задержка 500ms для группировки изменений
        
      } finally {
        setTimeout(() => {
          isSaving = false;
        }, 300);
      }
    }
    
    // Вкладки
    function showSchedule() {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab')[0].classList.add('active');
      loadSchedule();
    }
    
    // Функция для загрузки учеников
    async function showBookings() {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab')[1].classList.add('active');
      
      document.getElementById('content').innerHTML = `
        <div class="loading">
          Загрузка учеников...
        </div>
      `;
      
      try {
        // Используем правильный API для получения учеников
        const response = await fetch(`/api/teacher/students?tgId=${MY_ID}&t=${Date.now()}`);
        const data = await response.json();

    // Понедельник текущей недели и сегодня по Москве
    function getMoscowMondayAndToday() {
      const now = new Date();
      const moscowOffset = 3 * 60 * 60 * 1000;
      const moscowNow = new Date(now.getTime() + moscowOffset);
      const y = moscowNow.getUTCFullYear();
      const m = moscowNow.getUTCMonth();
      const d = moscowNow.getUTCDate();
      const dayOfWeek = moscowNow.getUTCDay();
      const daysToMonday = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
      const mondayDate = new Date(Date.UTC(y, m, d - daysToMonday));
      const todayStr = y + '-' + String(m + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
      const mondayStr = mondayDate.getUTCFullYear() + '-' + String(mondayDate.getUTCMonth() + 1).padStart(2, '0') + '-' + String(mondayDate.getUTCDate()).padStart(2, '0');
      return { start: mondayStr, end: todayStr };
    }

    function toggleStudentDetails(studentId, arrowId) {
      const detailsDiv = document.getElementById(studentId);
      const arrowDiv = document.getElementById(arrowId);
      if (detailsDiv) {
        const isHidden = detailsDiv.style.display === 'none' || !detailsDiv.style.display;

    async function loadStatisticsTeacher() {
      const startEl = document.getElementById('statStartDate');
      const endEl = document.getElementById('statEndDate');
      const contentEl = document.getElementById('statisticsContent');
      if (!startEl || !endEl || !contentEl) return;

      const startDate = startEl.value;
      const endDate = endEl.value;
      if (!startDate || !endDate) return;

      try {
        contentEl.innerHTML = '<div class="loading">Загрузка статистики...</div>';
        const response = await fetch('/api/teacher/statistics?tgId=' + (typeof MY_ID !== 'undefined' ? MY_ID : '') + '&start_date=' + startDate + '&end_date=' + endDate + '&t=' + Date.now());
        const data = await response.json();
        if (!response.ok) {
          contentEl.innerHTML = '<div class="error">' + (data.error || 'Ошибка загрузки статистики') + '</div>';
          return;
        }

        let html = `

        if (data.by_student && data.by_student.length > 0) {
          html += '<div class="section-title" style="margin-top: 16px; font-weight: 600;">По ученикам</div>';
          data.by_student.forEach((stat, index) => {
            const studentName = ((stat.student.first_name || '') + ' ' + (stat.student.last_name || '')).trim();
            const studentId = 'stat-student-' + index;
            const arrowId = 'stat-arrow-' + index;
            html += `
              <div class="student-stat" style="cursor: pointer; transition: background 0.2s;"

                   onmouseover="this.style.background='#1c2128'" onmouseout="this.style.background='#21262d'">

                  ${stat.lessons && stat.lessons.length > 0 ? stat.lessons.map(function(lesson) {
                    const date = new Date(lesson.date).toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric', weekday: 'short' });

                    const h = Math.floor(dm / 60);

                    return '<div style="background: #0d1117; border-radius: 8px; padding: 12px; margin-bottom: 8px; border-left: 3px solid #238636;">' +

        }

        contentEl.innerHTML = html;
      } catch (err) {
        console.error('Ошибка загрузки статистики:', err);

      }
    }

      const studentName = input.value.trim();
      
      // Обновляем расписание
      if (!schedule[day]) schedule[day] = {};
      const currentValue = schedule[day][time] || 0;
      const state = typeof currentValue === 'object' ? currentValue.status : currentValue;
      
      if (state === 2) {
        if (studentName) {
          schedule[day][time] = { status: 2, student_name: studentName };
        } else {
          schedule[day][time] = 2;
        }
      }
      
      // Обновляем UI

      if (slotElement && state === 2) {

    // Обработчик touch для долгого нажатия на мобильных устройствах
    function handleSlotTouchStart(event, day, time, state) {
      if (state !== 2) {
        return;
      }
      
      touchStartTime = Date.now();
      longPressTarget = { day, time, state };
      
      longPressTimer = setTimeout(() => {
        if (longPressTarget && longPressTarget.day === day && longPressTarget.time === time) {
          // Создаем синтетическое событие для открытия модального окна
          const syntheticEvent = { preventDefault: () => {}, stopPropagation: () => {} };
          handleSlotLongPress(syntheticEvent, day, time, state);
          longPressTarget = null;
        }
      }, 500); // 500ms для долгого нажатия
    }
    
    function handleSlotTouchEnd(event) {
      if (longPressTimer) {
        clearTimeout(longPressTimer);
        longPressTimer = null;
      }
      
      // Если нажатие было коротким (меньше 500ms), не открываем модальное окно
      if (touchStartTime && Date.now() - touchStartTime < 500) {
        longPressTarget = null;
      }
      
      touchStartTime = null;
    }
    
    window.handleSlotLongPress = handleSlotLongPress;
    window.handleSlotTouchStart = handleSlotTouchStart;
    window.handleSlotTouchEnd = handleSlotTouchEnd;

    window.saveStudentName = saveStudentName;
    window.clearStudentName = clearStudentName;
    
    // Календарный вид расписания в полноэкранном модальном окне
    function showCalendarView() {
      // Загружаем расписание если еще не загружено
      if (Object.keys(schedule).length === 0) {
        loadSchedule(true);
        setTimeout(() => openCalendarModal(), 500);
        return;
      }
      
      openCalendarModal();
    }
    
    function openCalendarModal() {
      const modal = document.createElement('div');
      modal.id = 'calendarModal';
      modal.style.cssText = `
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: #0d1117;
        z-index: 10000;
        overflow: auto;
        padding: 0;
      `;
      
      modal.innerHTML = renderCalendarView();
      document.body.appendChild(modal);
      
      // Блокируем прокрутку основного контента
      document.body.style.overflow = 'hidden';
    }
    
    function closeCalendarModal() {
      const modal = document.getElementById('calendarModal');
      if (modal) {
        document.body.removeChild(modal);
        document.body.style.overflow = '';
      }
    }
    
    function renderCalendarView() {
      const FULL_DAYS = ['Понедельник', 'Вторник', 'Среда', 'Четверг', 'Пятница', 'Суббота', 'Воскресенье'];
      const DAYS_SHORT = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];
      // Возвращаем слоты по 30 минут для точности
      const TIMES = [];
      for (let h = 8; h <= 22; h++) {
        TIMES.push(`${h.toString().padStart(2, '0')}:00`);
        if (h < 22) TIMES.push(`${h.toString().padStart(2, '0')}:30`);
      }
      
      // Подготовка данных для объединения ячеек
      const cellData = {};
      FULL_DAYS.forEach(day => {
        cellData[day] = {};
        TIMES.forEach((time, timeIndex) => {
          const slotValue = schedule[day]?.[time] || 0;
          const state = typeof slotValue === 'object' ? slotValue.status : slotValue;
          const studentName = typeof slotValue === 'object' && slotValue.student_name ? slotValue.student_name : null;
          
          // Проверяем, нужно ли объединять с предыдущим слотом
          let rowspan = 1;
          let shouldSkip = false;
          
          if (state === 2 && studentName && timeIndex > 0) {
            const prevTime = TIMES[timeIndex - 1];
            const prevSlotValue = schedule[day]?.[prevTime] || 0;
            const prevState = typeof prevSlotValue === 'object' ? prevSlotValue.status : prevSlotValue;
            const prevStudentName = typeof prevSlotValue === 'object' ? prevSlotValue.student_name : null;
            
            // Если предыдущий слот тоже занят тем же учеником, объединяем
            if (prevState === 2 && prevStudentName === studentName) {
              shouldSkip = true;
            }
          }
          
          if (!shouldSkip && state === 2 && studentName) {
            // Проверяем, сколько следующих слотов заняты тем же учеником
            let nextIndex = timeIndex + 1;
            while (nextIndex < TIMES.length) {
              const nextTime = TIMES[nextIndex];
              const nextSlotValue = schedule[day]?.[nextTime] || 0;
              const nextState = typeof nextSlotValue === 'object' ? nextSlotValue.status : nextSlotValue;
              const nextStudentName = typeof nextSlotValue === 'object' ? nextSlotValue.student_name : null;
              
              if (nextState === 2 && nextStudentName === studentName) {
                rowspan++;
                nextIndex++;
              } else {
                break;
              }
            }
          }
          
          cellData[day][time] = {
            state,
            studentName,
            rowspan,
            shouldSkip
          };
        });
      });
      
      let html = `
        <div style="
          position: fixed;
          top: 0;
          left: 0;
          right: 0;
          bottom: 0;
          background: #0d1117;
          padding: 8px;
          overflow: hidden;
          display: flex;
          flex-direction: column;
        ">
          <div style="
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            padding: 6px 10px;
            flex-shrink: 0;
          ">
            <h2 style="margin: 0; color: white; font-size: 16px; font-weight: 600;">📅 Календарное расписание на неделю</h2>
            <button onclick="closeCalendarModal()" style="
              background: #da3633;
              color: white;
              border: none;
              padding: 5px 10px;
              border-radius: 6px;
              font-size: 11px;
              font-weight: 600;
              cursor: pointer;
              transition: background 0.2s;
            " onmouseover="this.style.background='#c62828'" onmouseout="this.style.background='#da3633'">
              ✕ Закрыть
            </button>
          </div>
          
          <div style="
            background: #161b22;
            border-radius: 8px;
            padding: 6px;
            overflow: hidden;
            flex: 1;
            display: flex;
            flex-direction: column;
          ">
            <div style="overflow: auto; flex: 1;">
              <table style="width: 100%; border-collapse: collapse; font-size: 9px; table-layout: fixed;">
                <thead>
                  <tr>
                    <th style="
                      background: #21262d;
                      color: #c9d1d9;
                      padding: 4px 3px;
                      text-align: center;
                      font-weight: 600;
                      border: 1px solid #30363d;
                      position: sticky;
                      left: 0;
                      z-index: 10;
                      width: 45px;
                      font-size: 8px;
                    ">Время</th>
      `;
      
      // Заголовки дней недели - компактные
      FULL_DAYS.forEach((day, index) => {
        html += `
          <th style="
            background: #21262d;
            color: #c9d1d9;
            padding: 4px 3px;
            text-align: center;
            font-weight: 600;
            border: 1px solid #30363d;
            font-size: 9px;
          ">
            <div style="font-size: 10px; font-weight: 600;">${DAYS_SHORT[index]}</div>
          </th>
        `;
      });
      
      html += `</tr></thead><tbody>`;
      
      // Строки с временем и данными - компактные с объединением
      TIMES.forEach((time, timeIndex) => {
        html += `<tr>`;
        
        // Ячейка времени (sticky) - показываем полное время для каждого слота
        html += `
          <td style="
            background: #161b22;
            color: #8b949e;
            padding: 2px 1px;
            text-align: center;
            border: 1px solid #30363d;
            position: sticky;
            left: 0;
            z-index: 5;
            font-weight: 600;
            font-size: 8px;
            width: 45px;
            height: 18px;
          ">${time}</td>
        `;
        
        // Ячейки для каждого дня - компактные с объединением
        FULL_DAYS.forEach(day => {
          const cell = cellData[day][time];
          
          // Пропускаем ячейки, которые объединены с предыдущими
          if (cell.shouldSkip) {
            return;
          }
          
          let bgColor = '#21262d';
          let textColor = '#8b949e';
          
          if (cell.state === 1) {
            bgColor = '#238636';
            textColor = 'white';
          } else if (cell.state === 2) {
            bgColor = '#da3633';
            textColor = 'white';
          }
          
          const rowspanAttr = cell.rowspan > 1 ? `rowspan="${cell.rowspan}"` : '';
          const cellHeight = cell.rowspan > 1 ? cell.rowspan * 18 : 18;
          
          // Вычисляем длительность занятия в часах
          let durationText = '';
          if (cell.studentName && cell.rowspan > 0) {
            const hours = cell.rowspan * 0.5; // каждый слот = 0.5 часа
            if (hours === 0.5) {
              durationText = '30 мин';
            } else if (hours === Math.floor(hours)) {
              durationText = `${hours} ч`;
            } else {
              durationText = `${hours} ч`;
            }
          }
          
          html += `
            <td ${rowspanAttr} style="
              background: ${bgColor};
              color: ${textColor};
              padding: 2px 1px;
              border: 1px solid #30363d;
              text-align: center;
              vertical-align: middle;
              height: ${cellHeight}px;
              font-size: 8px;
            ">
              ${cell.studentName ? `
                <div style="
                  font-size: 8px;
                  font-weight: 600;
                  padding: 1px 2px;
                  background: rgba(255, 255, 255, 0.2);
                  border-radius: 2px;
                  word-break: break-word;
                  line-height: 1.1;
                  overflow: hidden;
                  text-overflow: ellipsis;
                  margin-bottom: 2px;
                " title="${cell.studentName}">${cell.studentName.length > 10 ? cell.studentName.substring(0, 8) + '..' : cell.studentName}</div>
                ${durationText ? `
                  <div style="
                    font-size: 6px;
                    color: rgba(255, 255, 255, 0.7);
                    margin-top: 1px;
                    line-height: 1;
                  ">${durationText}</div>
                ` : ''}
              ` : ''}
            </td>
          `;
        });
        
        html += `</tr>`;
      });
      
      html += `</tbody></table></div></div></div>`;
      
      return html;
    }
    
    window.showCalendarView = showCalendarView;
    window.closeCalendarModal = closeCalendarModal;
  </script>
</body>
</html>
